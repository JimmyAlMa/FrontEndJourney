<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {font-family: Arial, Helvetica, sans-serif; background-color: #ffffffec;}
        body.dark-mode {background-color: #000000cc; color: #ffffffec;}
        body.dark-mode .movieBox {border: 3px solid #ffffffec}
        br {border: 2px solid gray;}
        #movieContainer {display: flex; width: 100%; flex-wrap: wrap;}
        .movieBox {width: 300px; height: 430px; border: 3px solid #000000cc; border-radius: 5px; display: flex; flex-direction: column; align-items: center; margin: 5px; text-align: center;}
        .detailButton {margin-top: 10px; cursor: pointer;}
        #loadingText {color: gray;}
    </style>
    <title>Movie</title>
</head>
<body>
    <h1>Search Movie</h1>
    <input id="searchBar" type="search">
    <button onclick="search()">Search</button>
    <select name="category" id="category">
        <option value="movie" selected>Movie</option>
        <option value="series">Series</option>
    </select>
    <button onclick="changeTheme()" id="themeButton">Dark Mode</button>

    <hr>
    <div id="movieContainer">

    </div>
    <h1 id="loadingText">Loading...</h1>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
