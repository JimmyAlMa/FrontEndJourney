<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>body {font-family: Arial, Helvetica, sans-serif;}</style>
</head>
<body>
    <h1>Weather App</h1>
    <input type="search" id="searchBar">
    <button onclick="search()">Search</button>
    <button onclick="changeTemperature()">Change Temperature Unit</button>
    <hr>
    <div id="weatherContainer">
        <h2 id="country" class="mainFeature">Country:</h2>
        <h2 id="city" class="mainFeature">City:</h2>
        <h2 id="temperature" class="mainFeature">Temperature:</h2>
        <h2 id="weather" class="mainFeature">Weather Status:</h2>

        <h1 id="errorMessage"></h1>
    </div>


    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
