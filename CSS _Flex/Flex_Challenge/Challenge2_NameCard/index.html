<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Name Card</title>
</head>
<body>
    <div class="container">
        <div class="photo"></div>
        <div id="name"><b>Neil Louise Anderson</b></div>
        <div id="bio"><b>I'm a male, and I'm handsome. lorem ipsum dolor sit amet.</b></div>
        <div class="status">
            <div class="status-child" id="followers">
                <b>Followers:</b>
                <b>20</b>
            </div>
            <div class="status-child" id="following">
                <b>Following:</b>
                <b>25</b>
            </div>
            <div class="status-child" id="posts">
                <b>Posts:</b>
                <b>2</b>
            </div>
        </div>
    </div>
</body>
</html>
